<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Nature Photography Portfolio</title>
    <meta name="description" content="Nature photography portfolio. Birds, mammals and landscapes from Poland.">
    <meta name="keywords" content="nature photography, birds, mammals, wildlife">

    <!-- Open Graph (social media) -->
    <meta property="og:title" content="Nature Photography Portfolio">
    <meta property="og:description" content="Professional nature and wildlife photography">
    <meta property="og:type" content="website">

    <!-- Preconnect for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <!-- Netlify Identity Widget (for invite tokens) -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Handle Netlify Identity tokens and redirects -->
    <script>
      if (window.netlifyIdentity) {
        // Initialize with correct API URL
        window.netlifyIdentity.init({
          APIUrl: 'https://resilient-bublanina-cfacf2.netlify.app/.netlify/identity'
        });

        window.netlifyIdentity.on("init", user => {
          // Check if there's an invite token in URL
          if (window.location.hash.includes('invite_token') ||
              window.location.hash.includes('confirmation_token') ||
              window.location.hash.includes('recovery_token')) {
            // Force open the modal to handle the token
            window.netlifyIdentity.open();
          }

          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/photos/admin/";
            });
          }
        });
      }
    </script>
  </body>
</html>
